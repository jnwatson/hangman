<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="icon" type="image/svg+xml" href="/favicon.svg" />

		<!-- Static head — visible to social-media scrapers (which don't run JS).
		     Page-specific overrides can still be added via <svelte:head>. -->
		<meta name="description" content="The hardest game of hangman you'll ever play." />

		<!-- Open Graph (Facebook, LinkedIn, Slack, Discord, iMessage, etc.) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Dead Letters" />
		<meta property="og:url" content="https://deadletters.fun/" />
		<meta property="og:title" content="Dead Letters" />
		<meta property="og:description" content="The hardest game of hangman you'll ever play." />
		<meta property="og:image" content="https://deadletters.fun/og-image-v3.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="Dead Letters — adversarial hangman" />

		<!-- Twitter card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Dead Letters" />
		<meta name="twitter:description" content="The hardest game of hangman you'll ever play." />
		<meta name="twitter:image" content="https://deadletters.fun/og-image-v3.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
